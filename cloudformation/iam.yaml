AWSTemplateFormatVersion: '2010-09-09'

Description: >
  IAM layer for the Serverless Automation project.
  Defines the execution role and base policies for AWS Lambda
  following the Principle of Least Privilege (PoLP),
  with secure logging and S3 access controls.

###############################################################################
# PARAMETERS
###############################################################################

Parameters:

  ProjectName:
    Type: String
    Default: tarefas-automatizadas
    Description: Project name used for resource naming.

  Environment:
    Type: String
    Default: dev

    AllowedValues:
      - dev
      - homolog
      - prod

    Description: Deployment environment.

  BucketName:
    Type: String
    Description: S3 bucket that the Lambda function will access.

  LogGroupName:
    Type: String
    Default: ""
    Description: Optional CloudWatch Log Group name for tighter IAM scope.

###############################################################################
# CONDITIONS
###############################################################################

Conditions:

  HasCustomLogGroup: !Not [!Equals [!Ref LogGroupName, ""]]

###############################################################################
# RESOURCES
###############################################################################

Resources:

###############################################################################
# IAM ROLE - LAMBDA EXECUTION ROLE
###############################################################################

  LambdaExecutionRole:

    Type: AWS::IAM::Role

    Properties:

      RoleName: !Sub "${ProjectName}-${Environment}-lambda-role"

      Description: >
        Execution role for AWS Lambda function responsible for
        processing S3 events and writing logs to CloudWatch.

      AssumeRolePolicyDocument:

        Version: "2012-10-17"

        Statement:

          - Effect: Allow

            Principal:

              Service:

                - lambda.amazonaws.com

            Action:

              - sts:AssumeRole

      ManagedPolicyArns:

        # AWS managed policy for basic Lambda logging
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

        # X-Ray observability (best practice instead of inline policy)
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess

      Tags:

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

        - Key: ManagedBy
          Value: CloudFormation

        - Key: Layer
          Value: IAM

###############################################################################
# S3 ACCESS POLICY (STRICT LEAST PRIVILEGE)
###############################################################################

  S3AccessPolicy:

    Type: AWS::IAM::Policy

    Properties:

      PolicyName: !Sub "${ProjectName}-${Environment}-s3-access"

      Roles:

        - !Ref LambdaExecutionRole

      PolicyDocument:

        Version: "2012-10-17"

        Statement:

###############################################################################
# READ OBJECTS FROM SPECIFIC BUCKET ONLY
###############################################################################

          - Sid: AllowReadObjects

            Effect: Allow

            Action:

              - s3:GetObject
              - s3:GetObjectVersion

            Resource:

              - !Sub "arn:aws:s3:::${BucketName}/*"

###############################################################################
# LIST BUCKET CONTENT (LIMITED SCOPE)
###############################################################################

          - Sid: AllowListBucket

            Effect: Allow

            Action:

              - s3:ListBucket

            Resource:

              - !Sub "arn:aws:s3:::${BucketName}"

###############################################################################
# OPTIONAL: METADATA ACCESS (COMMON FOR LAMBDA PROCESSING)
###############################################################################

          - Sid: AllowGetBucketLocation

            Effect: Allow

            Action:

              - s3:GetBucketLocation

            Resource:

              - !Sub "arn:aws:s3:::${BucketName}" 
              ###############################################################################
# OPTIONAL: PARAMETER STORE ACCESS (SAFE EXTENSION)
###############################################################################

  ParameterStorePolicy:

    Type: AWS::IAM::Policy

    Properties:

      PolicyName: !Sub "${ProjectName}-${Environment}-ssm-access"

      Roles:

        - !Ref LambdaExecutionRole

      PolicyDocument:

        Version: "2012-10-17"

        Statement:

###############################################################################
# READ-ONLY ACCESS TO PARAMETER STORE (OPTIONAL EXTENSION)
###############################################################################

          - Sid: AllowSSMRead

            Effect: Allow

            Action:

              - ssm:GetParameter
              - ssm:GetParameters
              - ssm:GetParameterHistory

            Resource: "*"

###############################################################################
# CLOUDWATCH LOG GROUP SCOPING (OPTIONAL REFINEMENT)
###############################################################################

  CloudWatchScopedPolicy:

    Type: AWS::IAM::Policy

    Properties:

      PolicyName: !Sub "${ProjectName}-${Environment}-logs-scoped"

      Roles:

        - !Ref LambdaExecutionRole

      PolicyDocument:

        Version: "2012-10-17"

        Statement:

###############################################################################
# LIMIT LOGGING TO THIS PROJECT ONLY (BEST PRACTICE ENHANCEMENT)
###############################################################################

          - Sid: AllowLogGroupAccess

            Effect: Allow

            Action:

              - logs:CreateLogStream
              - logs:PutLogEvents

            Resource:

              - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-${Environment}*"

###############################################################################
# OUTPUTS
###############################################################################

Outputs:

  LambdaExecutionRoleName:

    Description: IAM Role name used by Lambda execution

    Value: !Ref LambdaExecutionRole

    Export:

      Name: !Sub "${AWS::StackName}-LambdaRoleName"

  LambdaExecutionRoleArn:

    Description: IAM Role ARN used by Lambda execution

    Value: !GetAtt LambdaExecutionRole.Arn

    Export:

      Name: !Sub "${AWS::StackName}-LambdaRoleArn"

  LambdaExecutionRoleId:

    Description: IAM Role unique ID

    Value: !GetAtt LambdaExecutionRole.RoleId

    Export:

      Name: !Sub "${AWS::StackName}-LambdaRoleId"
      
