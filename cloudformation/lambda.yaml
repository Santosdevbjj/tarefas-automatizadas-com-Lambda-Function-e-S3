AWSTemplateFormatVersion: '2010-09-09'

Description: >
  AWS Lambda function responsible for processing Amazon S3 events in a
  serverless automation architecture. The function is integrated with
  IAM (least privilege), CloudWatch Logs, and X-Ray observability.

###############################################################################
# PARAMETERS
###############################################################################

Parameters:

  ProjectName:
    Type: String
    Default: tarefas-automatizadas

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - homolog
      - prod

  LambdaFunctionName:
    Type: String
    Default: s3-event-processor

  Runtime:
    Type: String
    Default: python3.13
    AllowedValues:
      - python3.12
      - python3.13

  Architecture:
    Type: String
    Default: arm64
    AllowedValues:
      - arm64
      - x86_64

  MemorySize:
    Type: Number
    Default: 256
    MinValue: 128
    MaxValue: 10240

  Timeout:
    Type: Number
    Default: 30
    MinValue: 3
    MaxValue: 900

  LambdaRoleArn:
    Type: String

  SourceBucket:
    Type: String

  SourceKey:
    Type: String
    Default: lambda/lambda.zip

###############################################################################
# RESOURCES
###############################################################################

Resources:

###############################################################################
# CLOUDWATCH LOG GROUP
###############################################################################

  LambdaLogGroup:

    Type: AWS::Logs::LogGroup

    Properties:

      LogGroupName: !Sub "/aws/lambda/${ProjectName}-${Environment}-${LambdaFunctionName}"

      RetentionInDays: 30

###############################################################################
# LAMBDA FUNCTION
###############################################################################

  LambdaFunction:

    Type: AWS::Lambda::Function

    DependsOn:

      - LambdaLogGroup

    Properties:

      FunctionName: !Sub "${ProjectName}-${Environment}-${LambdaFunctionName}"

      Runtime: !Ref Runtime

      Handler: lambda_function.lambda_handler

      Architectures:
        - !Ref Architecture

      Role: !Ref LambdaRoleArn

      Timeout: !Ref Timeout

      MemorySize: !Ref MemorySize

      ReservedConcurrentExecutions: 10

      Code:

        S3Bucket: !Ref SourceBucket

        S3Key: !Ref SourceKey

      Environment:

        Variables:

          ENVIRONMENT: !Ref Environment

          PROJECT_NAME: !Ref ProjectName

          LOG_LEVEL: INFO

      TracingConfig:

        Mode: Active

      Tags:

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

        - Key: ManagedBy
          Value: CloudFormation

        - Key: Service
          Value: Lambda

###############################################################################
# LAMBDA PERMISSION (S3 INVOCATION)
###############################################################################

  LambdaInvokePermission:

    Type: AWS::Lambda::Permission

    Properties:

      Action: lambda:InvokeFunction

      FunctionName: !Ref LambdaFunction

      Principal: s3.amazonaws.com

      SourceAccount: !Ref AWS::AccountId

###############################################################################
# OUTPUTS
###############################################################################

Outputs:

  LambdaFunctionName:

    Value: !Ref LambdaFunction

    Export:
      Name: !Sub "${AWS::StackName}-LambdaName"

  LambdaFunctionArn:

    Value: !GetAtt LambdaFunction.Arn

    Export:
      Name: !Sub "${AWS::StackName}-LambdaArn"

  LambdaLogGroup:

    Value: !Ref LambdaLogGroup

    Export:
      Name: !Sub "${AWS::StackName}-LambdaLogGroup"
