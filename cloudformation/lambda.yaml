AWSTemplateFormatVersion: '2010-09-09'

Description: >
  CloudFormation template responsible for provisioning an AWS Lambda Function
  used to automate Amazon S3 event processing. The template creates the Lambda
  function, CloudWatch Log Group and exports resources for integration with
  other CloudFormation stacks.

###############################################################################
# PARAMETERS
###############################################################################

Parameters:

  ProjectName:
    Type: String
    Default: tarefas-automatizadas
    Description: Project name.

  Environment:

    Type: String

    Default: dev

    AllowedValues:

      - dev

      - homolog

      - prod

    Description: Deployment environment.

  LambdaFunctionName:

    Type: String

    Default: s3-event-processor

    Description: Lambda Function name.

  Runtime:

    Type: String

    Default: python3.13

    AllowedValues:

      - python3.12

      - python3.13

    Description: Lambda runtime.

  Architecture:

    Type: String

    Default: arm64

    AllowedValues:

      - arm64

      - x86_64

    Description: CPU Architecture.

  MemorySize:

    Type: Number

    Default: 256

    MinValue: 128

    MaxValue: 10240

    Description: Memory allocation (MB).

  Timeout:

    Type: Number

    Default: 30

    MinValue: 3

    MaxValue: 900

    Description: Function timeout in seconds.

  LambdaRoleArn:

    Type: String

    Description: ARN of the IAM Role created by iam.yaml.

  SourceBucket:

    Type: String

    Description: Bucket that stores the Lambda deployment package.

  SourceKey:

    Type: String

    Default: lambda/lambda.zip

    Description: Key of the deployment package.

###############################################################################
# RESOURCES
###############################################################################

Resources:

###############################################################################
# Lambda Function
###############################################################################

  LambdaFunction:

    Type: AWS::Lambda::Function

    Properties:

      FunctionName: !Sub "${ProjectName}-${Environment}-${LambdaFunctionName}"

      Description: >
        Automatically processes Amazon S3 ObjectCreated events.

      Runtime: !Ref Runtime

      Handler: lambda_function.lambda_handler

      Architectures:

        - !Ref Architecture

      Role: !Ref LambdaRoleArn

      Timeout: !Ref Timeout

      MemorySize: !Ref MemorySize

      PackageType: Zip

      Code:

        S3Bucket: !Ref SourceBucket

        S3Key: !Ref SourceKey

      Environment:

        Variables:

          ENVIRONMENT: !Ref Environment

          PROJECT_NAME: !Ref ProjectName

          LOG_LEVEL: INFO

      TracingConfig:

        Mode: Active

      Tags:

        - Key: Project

          Value: !Ref ProjectName

        - Key: Environment

          Value: !Ref Environment

        - Key: ManagedBy

          Value: CloudFormation

###############################################################################
# CloudWatch Logs
###############################################################################

  LambdaLogGroup:

    Type: AWS::Logs::LogGroup

    Properties:

      LogGroupName: !Sub "/aws/lambda/${ProjectName}-${Environment}-${LambdaFunctionName}"

      RetentionInDays: 30

###############################################################################
# Lambda Permission for Amazon S3
###############################################################################

  LambdaInvokePermission:

    Type: AWS::Lambda::Permission

    Properties:

      Action: lambda:InvokeFunction

      FunctionName: !Ref LambdaFunction

      Principal: s3.amazonaws.com

###############################################################################
# OUTPUTS
###############################################################################

Outputs:

  LambdaFunctionName:

    Description: Lambda Function Name.

    Value: !Ref LambdaFunction

    Export:

      Name: !Sub "${AWS::StackName}-LambdaFunctionName"

  LambdaFunctionArn:

    Description: Lambda Function ARN.

    Value: !GetAtt LambdaFunction.Arn

    Export:

      Name: !Sub "${AWS::StackName}-LambdaFunctionArn"

  LambdaLogGroup:

    Description: CloudWatch Log Group.

    Value: !Ref LambdaLogGroup

    Export:

      Name: !Sub "${AWS::StackName}-LambdaLogGroup"
