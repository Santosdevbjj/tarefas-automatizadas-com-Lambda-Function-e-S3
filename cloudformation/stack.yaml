AWSTemplateFormatVersion: '2010-09-09'

Description: >
  Master stack responsible for orchestrating the deployment of the
  Serverless Automation architecture using Nested CloudFormation Stacks.
  It provisions S3, IAM, and Lambda layers in a modular and secure way.

###############################################################################
# PARAMETERS
###############################################################################

Parameters:

  ProjectName:
    Type: String
    Default: tarefas-automatizadas

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - homolog
      - prod

  BucketTemplateURL:
    Type: String

  IAMTemplateURL:
    Type: String

  LambdaTemplateURL:
    Type: String

###############################################################################
# RESOURCES - NESTED STACKS
###############################################################################

Resources:

###############################################################################
# S3 STACK
###############################################################################

  BucketStack:

    Type: AWS::CloudFormation::Stack

    Properties:

      StackName: !Sub "${ProjectName}-${Environment}-s3-stack"

      TemplateURL: !Ref BucketTemplateURL

      Parameters:

        ProjectName: !Ref ProjectName

        Environment: !Ref Environment

###############################################################################
# IAM STACK
###############################################################################

  IAMStack:

    Type: AWS::CloudFormation::Stack

    DependsOn:
      - BucketStack

    Properties:

      StackName: !Sub "${ProjectName}-${Environment}-iam-stack"

      TemplateURL: !Ref IAMTemplateURL

      Parameters:

        ProjectName: !Ref ProjectName

        Environment: !Ref Environment

        BucketName: !GetAtt BucketStack.Outputs.BucketName

###############################################################################
# LAMBDA STACK
###############################################################################

  LambdaStack:

    Type: AWS::CloudFormation::Stack

    DependsOn:
      - IAMStack

    Properties:

      StackName: !Sub "${ProjectName}-${Environment}-lambda-stack"

      TemplateURL: !Ref LambdaTemplateURL

      Parameters:

        ProjectName: !Ref ProjectName

        Environment: !Ref Environment

        LambdaRoleArn: !GetAtt IAMStack.Outputs.LambdaExecutionRoleArn

        SourceBucket: !GetAtt BucketStack.Outputs.BucketName

###############################################################################
# OUTPUTS
###############################################################################

Outputs:

  BucketName:

    Description: S3 Bucket Name

    Value: !GetAtt BucketStack.Outputs.BucketName

    Export:
      Name: !Sub "${ProjectName}-${Environment}-BucketName"

  BucketArn:

    Description: S3 Bucket ARN

    Value: !GetAtt BucketStack.Outputs.BucketArn

  LambdaFunctionArn:

    Description: Lambda Function ARN

    Value: !GetAtt LambdaStack.Outputs.LambdaFunctionArn

    Export:
      Name: !Sub "${ProjectName}-${Environment}-LambdaArn"

  LambdaExecutionRoleArn:

    Description: IAM Role ARN

    Value: !GetAtt IAMStack.Outputs.LambdaExecutionRoleArn

    Export:
      Name: !Sub "${ProjectName}-${Environment}-LambdaRoleArn"

###############################################################################
# GLOBAL TAGS (BEST PRACTICE)
###############################################################################

Tags:

  Project: !Ref ProjectName

  Environment: !Ref Environment

  ManagedBy: CloudFormation

  Architecture: Serverless
