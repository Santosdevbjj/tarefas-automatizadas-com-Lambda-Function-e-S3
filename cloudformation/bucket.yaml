AWSTemplateFormatVersion: '2010-09-09'

Description: >
  Creates an Amazon S3 Bucket for the Serverless Automation project.
  The bucket is configured following AWS security best practices,
  including encryption, versioning, lifecycle management,
  ownership controls and public access blocking.

###############################################################################
# PARAMETERS
###############################################################################

Parameters:

  ProjectName:
    Type: String
    Default: tarefas
    Description: Project identifier used to compose resource names.

  Environment:
    Type: String
    Default: dev

    AllowedValues:
      - dev
      - homolog
      - prod

    Description: Deployment environment.

  BucketSuffix:
    Type: String
    Default: uploads

    Description: Logical suffix appended to the bucket name.

  EnableVersioning:
    Type: String

    Default: Enabled

    AllowedValues:
      - Enabled
      - Suspended

    Description: Enables or suspends bucket versioning.

  EnableAccessLogging:

    Type: String

    Default: "false"

    AllowedValues:
      - "true"
      - "false"

    Description: Enable Amazon S3 Server Access Logging.

  AccessLogsBucket:

    Type: String

    Default: ""

    Description: >
      Optional bucket used to store Amazon S3 Access Logs.

###############################################################################
# CONDITIONS
###############################################################################

Conditions:

  EnableLogging:

    !And

      - !Equals [!Ref EnableAccessLogging, "true"]

      - !Not [!Equals [!Ref AccessLogsBucket, ""]]

###############################################################################
# RESOURCES
###############################################################################

Resources:

###############################################################################
# AMAZON S3 BUCKET
###############################################################################

  ApplicationBucket:

    Type: AWS::S3::Bucket

    Properties:

      BucketName: !Sub
        - "${Project}-${Env}-${Account}-${Suffix}"
        - Project: !Ref ProjectName
          Env: !Ref Environment
          Account: !Ref AWS::AccountId
          Suffix: !Ref BucketSuffix

###############################################################################
# VERSIONING
###############################################################################

      VersioningConfiguration:

        Status: !Ref EnableVersioning

###############################################################################
# ENCRYPTION
###############################################################################

      BucketEncryption:

        ServerSideEncryptionConfiguration:

          - ServerSideEncryptionByDefault:

              SSEAlgorithm: AES256

###############################################################################
# PUBLIC ACCESS BLOCK
###############################################################################

      PublicAccessBlockConfiguration:

        BlockPublicAcls: true

        IgnorePublicAcls: true

        BlockPublicPolicy: true

        RestrictPublicBuckets: true

###############################################################################
# OBJECT OWNERSHIP
###############################################################################

      OwnershipControls:

        Rules:

          - ObjectOwnership: BucketOwnerEnforced

###############################################################################
# LIFECYCLE CONFIGURATION
###############################################################################

      LifecycleConfiguration:

        Rules:

          - Id: AbortIncompleteMultipartUploads

            Status: Enabled

            AbortIncompleteMultipartUpload:

              DaysAfterInitiation: 7

          - Id: TransitionOldVersions

            Status: Enabled

            NoncurrentVersionTransitions:

              - StorageClass: STANDARD_IA

                TransitionInDays: 30

          - Id: DeleteOldVersions

            Status: Enabled

            NoncurrentVersionExpiration:

              NoncurrentDays: 365

###############################################################################
# SERVER ACCESS LOGGING
###############################################################################

      LoggingConfiguration:

        !If

          - EnableLogging

          - DestinationBucketName: !Ref AccessLogsBucket
            LogFilePrefix: access-logs/

          - !Ref AWS::NoValue

###############################################################################
# TAGS
###############################################################################

      Tags:

        - Key: Name

          Value: !Sub "${ProjectName}-${Environment}-bucket"

        - Key: Project

          Value: !Ref ProjectName

        - Key: Environment

          Value: !Ref Environment

        - Key: Service

          Value: Amazon S3

        - Key: ManagedBy

          Value: CloudFormation

        - Key: Repository

          Value: tarefas-automatizadas-com-Lambda-Function-e-S3

        - Key: CostCenter

          Value: Cloud-Lab 

          ###############################################################################
# BUCKET POLICY
###############################################################################

  ApplicationBucketPolicy:

    Type: AWS::S3::BucketPolicy

    Properties:

      Bucket: !Ref ApplicationBucket

      PolicyDocument:

        Version: "2012-10-17"

        Statement:

###############################################################################
# REQUIRE HTTPS
###############################################################################

          - Sid: DenyInsecureTransport

            Effect: Deny

            Principal: "*"

            Action: "s3:*"

            Resource:

              - !GetAtt ApplicationBucket.Arn
              - !Sub "${ApplicationBucket.Arn}/*"

            Condition:

              Bool:

                aws:SecureTransport: "false"

###############################################################################
# DENY UNENCRYPTED OBJECT UPLOADS
###############################################################################

          - Sid: DenyUnencryptedUploads

            Effect: Deny

            Principal: "*"

            Action:

              - s3:PutObject

            Resource:

              - !Sub "${ApplicationBucket.Arn}/*"

            Condition:

              StringNotEquals:

                s3:x-amz-server-side-encryption: AES256

###############################################################################
# OPTIONAL TLS VERSION ENFORCEMENT
###############################################################################

          - Sid: EnforceModernTLS

            Effect: Deny

            Principal: "*"

            Action: "s3:*"

            Resource:

              - !GetAtt ApplicationBucket.Arn
              - !Sub "${ApplicationBucket.Arn}/*"

            Condition:

              NumericLessThan:

                s3:TlsVersion: 1.2

###############################################################################
# OUTPUTS
###############################################################################

Outputs:

  BucketName:

    Description: Amazon S3 Bucket Name.

    Value: !Ref ApplicationBucket

    Export:

      Name: !Sub "${AWS::StackName}-BucketName"

  BucketArn:

    Description: Amazon S3 Bucket ARN.

    Value: !GetAtt ApplicationBucket.Arn

    Export:

      Name: !Sub "${AWS::StackName}-BucketArn"

  BucketRegionalDomainName:

    Description: Regional endpoint.

    Value: !GetAtt ApplicationBucket.RegionalDomainName

    Export:

      Name: !Sub "${AWS::StackName}-BucketRegionalDomainName"

  BucketDomainName:

    Description: Bucket DNS name.

    Value: !GetAtt ApplicationBucket.DomainName

    Export:

      Name: !Sub "${AWS::StackName}-BucketDomainName"

  BucketWebsiteURL:

    Description: Website endpoint (if website hosting is enabled).

    Value: !GetAtt ApplicationBucket.WebsiteURL

    Export:

      Name: !Sub "${AWS::StackName}-BucketWebsiteURL" 
      
